<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Exam-Cram tab capture harness</title>
    <style>
      body { max-width: 720px; margin: 64px auto; padding: 0 24px; font: 16px/1.55 system-ui, sans-serif; }
      button { min-height: 44px; padding: 0 18px; }
      video { display: block; width: 320px; min-height: 120px; margin-top: 24px; background: #111; }
    </style>
  </head>
  <body>
    <h1>Tab-capture runtime harness</h1>
    <p>This local page emits a quiet tone so the loaded extension can verify Chrome's real tab-audio stream.</p>
    <button id="startTone" type="button">Start test tone</button>
    <video id="captureVideo" controls poster="/tests/fixtures/capture-harness-poster.png"></video>
    <script>
      document.getElementById("startTone").addEventListener("click", async () => {
        if (window.__examCramHarnessAudio) return;
        const context = new AudioContext();
        const oscillator = context.createOscillator();
        const gain = context.createGain();
        oscillator.frequency.value = 440;
        gain.gain.value = 0.035;
        oscillator.connect(gain).connect(context.destination);
        oscillator.start();
        await context.resume();
        window.__examCramHarnessAudio = { context, oscillator, gain };
        document.getElementById("startTone").textContent = "Test tone playing";
      });
    </script>
  </body>
</html>
