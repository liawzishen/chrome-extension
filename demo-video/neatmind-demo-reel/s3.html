<!doctype html>
<html lang="en" data-resolution="landscape">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=1280, height=720"/>
<script src="vendor/gsap.min.js"></script>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html,body { width:1280px; height:720px; overflow:hidden; background:#241811; }
body { font-family:"Inter",-apple-system,"Segoe UI",Roboto,sans-serif; color:#f4ebd7; }
.scene-bg { position:absolute; inset:0; }
.kicker { position:absolute; font-size:20px; letter-spacing:4px; text-transform:uppercase; color:#d9a441; font-weight:700; }
.cap { position:absolute; left:70px; bottom:56px; max-width:1140px; font-size:38px; font-weight:700; color:#f7efdd; line-height:1.25; text-shadow:0 3px 18px rgba(0,0,0,.5); }
.cap.small { font-size:30px; }
.center { position:absolute; left:50%; top:50%; transform:translate(-50%,-50%); }
.card { background:#f4ebd7; border-radius:18px; box-shadow:0 22px 60px rgba(0,0,0,.5); color:#2c1e14; }
.chip { position:absolute; border-radius:14px; box-shadow:0 12px 30px rgba(0,0,0,.45); }
.wordmark { font-family:Georgia,"Times New Roman",serif; font-weight:700; color:#f7efdd; }
.rust { color:#c56a4f; }
.grn { color:#3f9d63; }
img.shot { display:block; border-radius:14px; box-shadow:0 20px 60px rgba(0,0,0,.55); border:1px solid rgba(0,0,0,.15); }
.gate { position:absolute; border:3px solid #d9a441; border-radius:16px; color:#f7efdd; }
.pill { position:absolute; border-radius:999px; font-weight:700; display:flex; align-items:center; justify-content:center; }
.ring { position:absolute; border:5px solid #e0b24d; border-radius:14px; box-shadow:0 0 30px rgba(224,178,77,.6); }
</style>
</head>
<body>
<div id="root" data-composition-id="s3" data-start="0" data-duration="15" data-width="1280" data-height="720" style="position:relative;width:1280px;height:720px;overflow:hidden;background:#241811;">
<div id="s3-k" class="clip kicker" data-start="0" data-duration="15" data-track-index="1" style="left:70px;top:56px;">THE CORE IDEA · EVIDENCE-GROUNDED</div>
<div id="s3-ev" class="clip " data-start="0.5" data-duration="6.0" data-track-index="2" style="position:absolute;left:140px;top:230px;width:1000px;"><img class="shot" src="assets/ui/hero_evidence.png" style="width:1000px;"/></div>
<div id="s3-c1" class="clip cap" data-start="0.9" data-duration="5.4" data-track-index="4" style="">Every concept shows its receipt — no API key, no setup.</div>
<div id="s3-con" class="clip " data-start="6.5" data-duration="8.5" data-track-index="2" style="position:absolute;left:390px;top:120px;width:500px;"><img class="shot" src="assets/ui/hero_concept.png" style="width:500px;"/></div>
<div id="s3-ring" class="clip ring" data-start="9.2" data-duration="3.4" data-track-index="3" style="left:410px;top:430px;width:460px;height:150px;"></div>
<div id="s3-c2" class="clip cap small" data-start="6.9" data-duration="8.1" data-track-index="4" style="">Quoted source evidence + one-click <span class="rust">Report unsupported claim.</span></div>
</div>
<script>
window.__timelines = window.__timelines || {};
const tl = gsap.timeline({ paused:true });
tl.from("#s3-k",{opacity:0,duration:.5},0);
      tl.from("#s3-ev",{opacity:0,y:24,duration:.6},0.5);
      tl.from("#s3-c1",{opacity:0,y:20,duration:.5},0.9);
      tl.to("#s3-ev",{opacity:0,duration:.4},6.2);
      tl.from("#s3-con",{opacity:0,scale:.9,duration:.6},6.5);
      tl.from("#s3-c2",{opacity:0,y:20,duration:.5},6.9);
      tl.fromTo("#s3-ring",{opacity:0,scale:1.08},{opacity:1,scale:1,duration:.5},9.2);
      tl.to("#s3-ring",{opacity:.35,duration:.6,yoyo:true,repeat:2},9.8);
window.__timelines["s3"] = tl;
</script>
</body>
</html>
