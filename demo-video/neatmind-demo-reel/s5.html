<!doctype html>
<html lang="en" data-resolution="landscape">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=1280, height=720"/>
<script src="vendor/gsap.min.js"></script>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html,body { width:1280px; height:720px; overflow:hidden; background:#241811; }
body { font-family:"Inter",-apple-system,"Segoe UI",Roboto,sans-serif; color:#f4ebd7; }
.scene-bg { position:absolute; inset:0; }
.kicker { position:absolute; font-size:20px; letter-spacing:4px; text-transform:uppercase; color:#d9a441; font-weight:700; }
.cap { position:absolute; left:70px; bottom:56px; max-width:1140px; font-size:38px; font-weight:700; color:#f7efdd; line-height:1.25; text-shadow:0 3px 18px rgba(0,0,0,.5); }
.cap.small { font-size:30px; }
.center { position:absolute; left:50%; top:50%; transform:translate(-50%,-50%); }
.card { background:#f4ebd7; border-radius:18px; box-shadow:0 22px 60px rgba(0,0,0,.5); color:#2c1e14; }
.chip { position:absolute; border-radius:14px; box-shadow:0 12px 30px rgba(0,0,0,.45); }
.wordmark { font-family:Georgia,"Times New Roman",serif; font-weight:700; color:#f7efdd; }
.rust { color:#c56a4f; }
.grn { color:#3f9d63; }
img.shot { display:block; border-radius:14px; box-shadow:0 20px 60px rgba(0,0,0,.55); border:1px solid rgba(0,0,0,.15); }
.gate { position:absolute; border:3px solid #d9a441; border-radius:16px; color:#f7efdd; }
.pill { position:absolute; border-radius:999px; font-weight:700; display:flex; align-items:center; justify-content:center; }
.ring { position:absolute; border:5px solid #e0b24d; border-radius:14px; box-shadow:0 0 30px rgba(224,178,77,.6); }
</style>
</head>
<body>
<div id="root" data-composition-id="s5" data-start="0" data-duration="9" data-width="1280" data-height="720" style="position:relative;width:1280px;height:720px;overflow:hidden;background:#241811;">
<div id="s5-k" class="clip kicker" data-start="0" data-duration="9" data-track-index="1" style="left:70px;top:52px;">ACTIVE RECALL · RECORDED</div>
<div id="s5-quiz" class="clip " data-start="0.4" data-duration="8.6" data-track-index="2" style="position:absolute;left:70px;top:150px;width:560px;"><img class="shot" src="assets/ui/hero_quiz.png" style="width:560px;"/></div>
<div id="s5-toast" class="clip " data-start="3.2" data-duration="5.8" data-track-index="3" style="position:absolute;left:250px;top:250px;background:#2f7d4f;color:#fff;font-weight:700;font-size:24px;padding:16px 26px;border-radius:12px;box-shadow:0 14px 34px rgba(0,0,0,.4);">✓ Quiz complete — saved to your Journey</div>
<div id="s5-gau" class="clip " data-start="4.2" data-duration="4.8" data-track-index="2" style="position:absolute;left:690px;top:210px;width:540px;"><img class="shot" src="assets/ui/hero_journey_gauges.png" style="width:540px;"/></div>
<div id="s5-c1" class="clip cap small" data-start="0.6" data-duration="8.4" data-track-index="4" style="">Answer, submit — and it persists. Not a disposable chat.</div>
</div>
<script>
window.__timelines = window.__timelines || {};
const tl = gsap.timeline({ paused:true });
tl.from("#s5-k",{opacity:0,duration:.5},0);
      tl.from("#s5-quiz",{opacity:0,x:-30,duration:.6},0.4);
      tl.from("#s5-toast",{opacity:0,scale:.8,duration:.4},3.2);
      tl.from("#s5-gau",{opacity:0,x:40,duration:.6},4.2);
      tl.from("#s5-c1",{opacity:0,y:20,duration:.5},0.6);
window.__timelines["s5"] = tl;
</script>
</body>
</html>
